# Qwen3-30B Best Practice Configuration
# Last updated: 2026-02-27

model:
  name: "Qwen3-30B"
  category: dense
  description: "Qwen3 30B dense model, requires TP2 deployment"
  hf_path: "Qwen/Qwen3-30B-A3B"
  architectures: ["Qwen3ForCausalLM"]

deployment:
  recommended_tp: 2
  min_npu_count: 2
  recommended_memory_gb: 64

performance:
  max_model_len: 32768
  max_num_seqs: 256
  max_num_batched_tokens: 4096
  block_size: 128
  gpu_memory_utilization: 0.9

env_vars:
  VLLM_USE_V1: 1
  OMP_PROC_BIND: false
  OMP_NUM_THREADS: 10
  CPU_AFFINITY_CONF: 2
  TASK_QUEUE_ENABLE: 1
  ASCEND_RT_VISIBLE_DEVICES: "0,1"
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  HCCL_BUFFSIZE: 1024
  HCCL_CONNECT_TIMEOUT: 600
  HCCL_EXEC_TIMEOUT: 600

vllm_args:
  trust_remote_code: true
  quantization: ascend
  async_scheduling: true
  no_enable_prefix_caching: true
  no_enforce_eager: true
  distributed_executor_backend: mp

additional_config:
  enable_cpu_binding: true

compilation_config:
  cudagraph_mode: "FULL_DECODE_ONLY"

# Feature support
features:
  chunked_prefill: true
  automatic_prefix_cache: false
  speculative_decoding: false
  lora: false

# Quantization support
quantization:
  ascend: true  # W8A8, MXFP8
  gptq: false
  awq: false

# Example launch command
example_command: |
  vllm serve /path/to/Qwen3-30B \
    --host 0.0.0.0 \
    --port 8000 \
    --served-model-name Qwen3-30B-TP2 \
    --trust-remote-code \
    --max-num-seqs 256 \
    --max-model-len 32768 \
    --max-num-batched-tokens 4096 \
    --tensor-parallel-size 2 \
    --distributed-executor-backend mp \
    --quantization ascend \
    --gpu-memory-utilization 0.9 \
    --no-enable-prefix-caching \
    --async-scheduling \
    --no-enforce-eager \
    --additional-config '{"enable_cpu_binding":true}' \
    --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY"}'
