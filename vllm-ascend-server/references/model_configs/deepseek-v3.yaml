# DeepSeek-V3 Best Practice Configuration (MoE)
# Last updated: 2026-02-27

model:
  name: "DeepSeek-V3"
  category: moe
  description: "DeepSeek-V3 671B MoE model with 37B active parameters"
  hf_path: "deepseek-ai/DeepSeek-V3"
  architectures: ["DeepseekV3ForCausalLM"]

deployment:
  recommended_tp: 8
  min_npu_count: 8
  recommended_memory_gb: 512

performance:
  max_model_len: 65536
  max_num_seqs: 64
  max_num_batched_tokens: 8192
  block_size: 128
  gpu_memory_utilization: 0.85

env_vars:
  VLLM_USE_V1: 1
  OMP_PROC_BIND: false
  OMP_NUM_THREADS: 8
  CPU_AFFINITY_CONF: 2
  TASK_QUEUE_ENABLE: 1
  ASCEND_RT_VISIBLE_DEVICES: "0,1,2,3,4,5,6,7"
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  HCCL_BUFFSIZE: 4096
  HCCL_CONNECT_TIMEOUT: 1800
  HCCL_EXEC_TIMEOUT: 1800
  VLLM_ASCEND_ENABLE_MOE_OPTIMIZE: 1

vllm_args:
  trust_remote_code: true
  quantization: ascend
  async_scheduling: true
  no_enable_prefix_caching: true
  distributed_executor_backend: ray

additional_config:
  enable_cpu_binding: true

compilation_config:
  cudagraph_mode: "FULL_DECODE_ONLY"

# Feature support
features:
  chunked_prefill: true
  automatic_prefix_cache: false
  speculative_decoding: false
  lora: false
  expert_parallel: true
  context_parallel: true

# Quantization support
quantization:
  ascend: true
  gptq: false
  awq: false

# MoE-specific settings
moe_config:
  num_experts: 256
  num_experts_per_tok: 8
  expert_parallel_size: 8

# Context parallel for long context
context_parallel:
  enabled: true
  context_parallel_size: 2

# Example launch command
example_command: |
  vllm serve /path/to/DeepSeek-V3 \
    --host 0.0.0.0 \
    --port 8000 \
    --served-model-name DeepSeek-V3 \
    --trust-remote-code \
    --max-num-seqs 64 \
    --max-model-len 65536 \
    --max-num-batched-tokens 8192 \
    --tensor-parallel-size 8 \
    --distributed-executor-backend ray \
    --quantization ascend \
    --gpu-memory-utilization 0.85 \
    --no-enable-prefix-caching \
    --async-scheduling \
    --additional-config '{"enable_cpu_binding":true}' \
    --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY"}'
