name: Validate Skills

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate SKILL.md files
        run: |
          python3 scripts/validate_skills.py

      - name: Check frontmatter
        run: |
          echo "=== Checking all SKILL.md files have valid frontmatter ==="
          find . -name "SKILL.md" | while read f; do
            echo "Checking: $f"
            # Check YAML frontmatter exists
            if ! head -1 "$f" | grep -q "^---$"; then
              echo "ERROR: Missing opening --- in $f"
              exit 1
            fi
            # Check name field exists
            if ! grep -q "^name:" "$f"; then
              echo "ERROR: Missing 'name:' field in $f"
              exit 1
            fi
            # Check description field exists
            if ! grep -q "^description:" "$f"; then
              echo "ERROR: Missing 'description:' field in $f"
              exit 1
            fi
          done
          echo "All SKILL.md files have valid frontmatter!"

      - name: Verify skill names follow repository rules
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          CATEGORY_DIRS = {'base', 'inference', 'training', 'profiling', 'ops', 'knowledge'}

          def parse_name(skill_path: Path) -> str:
              content = skill_path.read_text(encoding='utf-8')
              match = re.search(r'^name:\s*(.+)$', content, re.MULTILINE)
              return match.group(1).strip() if match else ''

          repo_root = Path('.')
          skill_files = [f for f in repo_root.glob('**/SKILL.md') if '.worktrees' not in f.parts]

          print('=== Verifying skill names follow repository rules ===')
          for skill_path in sorted(skill_files):
              actual_name = parse_name(skill_path)
              rel_parts = skill_path.relative_to(repo_root).parts
              is_in_agents = '.agents' in rel_parts
              depth = len(rel_parts) - 1
              is_categorized_leaf = depth == 2 and rel_parts[0] in CATEGORY_DIRS and not is_in_agents
              is_categorized_nested = depth > 2 and rel_parts[0] in CATEGORY_DIRS and not is_in_agents
              is_nested_skill = depth > 1 and not is_in_agents and not is_categorized_leaf and not is_categorized_nested

              if is_categorized_leaf:
                  expected_name = skill_path.parent.name
                  if actual_name != expected_name:
                      raise SystemExit(
                          f"Categorized leaf skill name '{actual_name}' doesn't match directory '{expected_name}' "
                          f"(file: {skill_path})"
                      )
                  print(f"OK: {skill_path} -> name: {actual_name} (categorized leaf)")
              elif is_categorized_nested:
                  folder_name = rel_parts[1]
                  if not actual_name.startswith(f'{folder_name}-'):
                      raise SystemExit(
                          f"Categorized nested skill name '{actual_name}' should start with '{folder_name}-' "
                          f"(file: {skill_path})"
                      )
                  print(f"OK: {skill_path} -> name: {actual_name} (categorized nested)")
              elif is_nested_skill:
                  folder_name = rel_parts[0]
                  if not actual_name.startswith(f'{folder_name}-'):
                      raise SystemExit(
                          f"Nested skill name '{actual_name}' should start with '{folder_name}-' "
                          f"(file: {skill_path})"
                      )
                  print(f"OK: {skill_path} -> name: {actual_name} (nested rule)")
              else:
                  expected_name = skill_path.parent.name
                  if actual_name != expected_name:
                      raise SystemExit(
                          f"Skill name '{actual_name}' doesn't match directory '{expected_name}' "
                          f"(file: {skill_path})"
                      )
                  print(f"OK: {skill_path} -> name: {actual_name} (exact match)")

          print('All skill names follow repository rules!')
          PY

      - name: Check for broken internal links
        run: |
          echo "=== Checking for broken internal links ==="
          find . -name "SKILL.md" | while read f; do
            dir=$(dirname "$f")
            # Extract relative links like [text](../path/)
            grep -oE '\]\([^)]+\.md\)' "$f" | tr -d '[]()' | while read link; do
              # Resolve relative path
              target="$dir/$link"
              if [ ! -f "$target" ]; then
                echo "WARNING: Broken link in $f -> $link (target: $target)"
              fi
            done
          done
          echo "Link check complete!"

      - name: Check governance references and onboarding tree
        run: |
          python3 - <<'PY'
          from pathlib import Path

          repo = Path('.')
          required_files = {
              'README.md': repo / 'README.md',
              'PR template': repo / '.github' / 'PULL_REQUEST_TEMPLATE.md',
              'Governance doc': repo / 'docs' / 'governance' / 'skill-governance.md',
              'Skill feedback template': repo / '.github' / 'ISSUE_TEMPLATE' / 'skill-feedback.yml',
          }

          for label, path in required_files.items():
              if not path.exists():
                  raise SystemExit(f'Missing required file for governance flow: {label} -> {path}')

          readme = (repo / 'README.md').read_text(encoding='utf-8')
          pr_template = (repo / '.github' / 'PULL_REQUEST_TEMPLATE.md').read_text(encoding='utf-8')
          governance = (repo / 'docs' / 'governance' / 'skill-governance.md').read_text(encoding='utf-8')

          readme_checks = [
              'Start',
              'ascend-base',
              'ascend-inference',
              'ascend-training',
              'ascend-profiling',
              'ascend-ops',
              'ascend-ai-for-science',
              'docs/governance/skill-governance.md',
              '.github/ISSUE_TEMPLATE/skill-feedback.yml',
          ]
          for token in readme_checks:
              if token not in readme:
                  raise SystemExit(f'README is missing required governance/onboarding token: {token}')

          pr_checks = [
              '### 治理规则检查',
              'docs/governance/skill-governance.md',
              'decision tree',
          ]
          for token in pr_checks:
              if token not in pr_template:
                  raise SystemExit(f'PR template is missing required governance checklist token: {token}')

          governance_checks = [
              '## 2. Skill Taxonomy',
              '## 8. Governance Checklist',
              'decision tree / Quick Start',
          ]
          for token in governance_checks:
              if token not in governance:
                  raise SystemExit(f'Governance doc is missing expected section/token: {token}')

          print('Governance references and onboarding tree look good!')
          PY
