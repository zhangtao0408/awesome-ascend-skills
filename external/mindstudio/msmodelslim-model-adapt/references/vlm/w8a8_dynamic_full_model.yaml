apiversion: multimodal_vlm_modelslim_v1

spec:
  process:
    - type: "linear_quant"
      qconfig:
        act:
          scope: "per_token"    # dynamic
          dtype: "int8"
          symmetric: True
          method: "minmax"
        weight:
          scope: "per_channel"
          dtype: "int8"
          symmetric: True
          method: "minmax"
      include: ["*"]            # 全模型量化
      exclude: []               # 不回退

  save:
    - type: "ascendv1_saver"
      part_file_size: 4

  # 多模态校准数据（需按实际数据集名称调整）
  dataset: "calibImages"
  default_text: "Describe this image in detail."
